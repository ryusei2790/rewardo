# Rewardo 開発環境用 docker-compose
# 使い方:
#   1. .env.local を .env.local.example を参考に作成する
#   2. docker compose up --build
#   3. http://localhost:3000 にアクセス

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      # ホストのソースコードをコンテナにマウント（ホットリロード対応）
      - .:/app
      # node_modules はコンテナ内のものを使う（ホスト側で上書きされるのを防ぐ）
      - /app/node_modules
      # .next ビルドキャッシュもコンテナ内で管理
      - /app/.next
    env_file:
      - .env.local
    environment:
      # Next.js のホットリロードを Docker 内で確実に動かすための設定
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
    stdin_open: true
    tty: true
